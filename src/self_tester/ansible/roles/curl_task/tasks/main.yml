---
- name: Clear loop variables
  set_fact:
    _request_url: ""
    _request_body: ""
    _request_headers: ""
    _cookie_string: ""
    _parsed_cookies_json: "{}"
- name: Load body from file if body_file specified
  slurp:
    src: "{{ task_config.body_file }}"
  register: _body_file_content
  when: task_config.body_file is defined

- name: Set request body (from file or inline)
  set_fact:
    _request_body: "{{ (_body_file_content.content | b64decode | from_json) if task_config.body_file is defined else (task_config.body | default({})) }}"

- name: Inject projectSlug into body if requested
  set_fact:
    _request_body: "{{ _request_body | combine({'projectSlug': task_outputs[task_config.inject_slug_from].body.slug}) }}"
  when: task_config.inject_slug_from is defined and task_config.inject_slug_from in task_outputs

- name: Inject external_id into body if requested
  set_fact:
    _request_body: "{{ _request_body | combine({'external_id': task_outputs[task_config.inject_external_id_from].body.orderSlug}) }}"
  when: task_config.inject_external_id_from is defined and task_config.inject_external_id_from in task_outputs

- name: Inject generic field into body if requested
  set_fact:
    _request_body: "{{ _request_body | combine({task_config.inject_body_key: (task_outputs[task_config.inject_body_from].body[0][task_config.inject_body_field] if (task_outputs[task_config.inject_body_from].body is iterable and task_outputs[task_config.inject_body_from].body is not mapping and task_outputs[task_config.inject_body_from].body is not string) else task_outputs[task_config.inject_body_from].body[task_config.inject_body_field])}) }}"
  when: task_config.inject_body_from is defined and task_config.inject_body_key is defined and task_config.inject_body_field is defined and task_config.inject_body_from in task_outputs

- name: Build Cookie string
  set_fact:
    _cookie_string: >-
      {% set _c = (task_outputs['get_csrf_token'].cookies | default({})) | combine(task_outputs[task_config.source_auth_task].cookies | default({})) if ('get_csrf_token' in task_outputs and task_config.source_auth_task is defined and task_config.source_auth_task in task_outputs) else {} %}
      {% set _cs = [] %}
      {% for k, v in _c.items() %}
      {% set _ = _cs.append(k ~ '=' ~ v) %}
      {% endfor %}
      {{ _cs | join('; ') }}

- name: Set request headers (inject auth from previous task if source_auth_task provided)
  set_fact:
    _request_headers: >-
      {{
        task_config.headers | default({}) | combine(
          ({
            'X-CSRF-TOKEN': (task_outputs[task_config.source_auth_task].body.token if (task_outputs[task_config.source_auth_task].body is mapping and 'token' in task_outputs[task_config.source_auth_task].body) else omit),
            'X-XSRF-TOKEN': (task_outputs[task_config.source_auth_task].cookies['XSRF-TOKEN'] | urldecode if (task_outputs[task_config.source_auth_task].cookies is mapping and 'XSRF-TOKEN' in task_outputs[task_config.source_auth_task].cookies) else (task_outputs['get_csrf_token'].cookies['XSRF-TOKEN'] | urldecode if ('get_csrf_token' in task_outputs and task_outputs['get_csrf_token'].cookies is mapping and 'XSRF-TOKEN' in task_outputs['get_csrf_token'].cookies) else omit)),
            'Cookie': _cookie_string | trim if (_cookie_string | trim | length > 0) else task_outputs[task_config.source_auth_task].cookies_string | default(omit)
          } if task_config.source_auth_task is defined and task_config.source_auth_task in task_outputs else {})
        )
      }}

- name: Debug request headers
  debug:
    var: _request_headers

- name: Resolve URL
  set_fact:
    _request_url: >-
      {{
        task_config.url | replace('{' + task_config.inject_url_key + '}', (task_outputs[task_config.inject_url_from].body[0][task_config.inject_url_key] if (task_outputs[task_config.inject_url_from].body is iterable and task_outputs[task_config.inject_url_from].body is not mapping and task_outputs[task_config.inject_url_from].body is not string) else task_outputs[task_config.inject_url_from].body[task_config.inject_url_key]) | string)
      }}
  when: task_config.inject_url_from is defined and task_config.inject_url_key is defined and task_config.inject_url_from in task_outputs

- name: Execute HTTP request with uri module
  ansible.builtin.uri:
    url: "{{ _request_url if _request_url else task_config.url }}"
    method: "{{ task_config.method | default('POST') }}"
    headers: "{{ _request_headers }}"
    body_format: "{{ 'json' if (task_config.body_file is defined or task_config.body is defined) else omit }}"
    body: "{{ _request_body if _request_body else omit }}"
    return_content: true
    validate_certs: false
    status_code: "{{ task_config.expected_status | default([200, 201, 204, 400, 401, 403, 404, 500]) }}"
  register: uri_result

- name: Parse set_cookie headers to dict
  set_fact:
    _parsed_cookies_json: >-
      {% set _c = {} %}
      {% set sc = _uri_headers.get('set-cookie', _uri_headers.get('set_cookie', [])) %}
      {% set sc_list = sc if sc is iterable and sc is not string else [sc] %}
      {% for c in sc_list %}
        {% if c and '=' in c %}
          {% set parts = c.split(';')[0].split('=', 1) %}
          {% set _ = _c.update({parts[0]: parts[1]}) %}
        {% endif %}
      {% endfor %}
      {{ _c | to_json }}
  vars:
    _uri_exclude: ["status", "url", "elapsed", "json", "content", "content_type", "msg", "redirected", "cookies", "cookies_string", "changed", "invocation", "failed", "failed_when_result"]
    _uri_headers: "{{ (uri_result | dict2items | rejectattr('key', 'in', _uri_exclude)) | items2dict | default({}) }}"

- name: Build task output (uri result mapped to curl-like shape for compare_json)
  set_fact:
    task_output:
      status_code: "{{ uri_result.status }}"
      headers: "{{ _uri_headers }}"
      body: "{{ uri_result.json | default(uri_result.content) | default('') }}"
      request_id: "{{ _uri_headers.get('X-Request-ID') or _uri_headers.get('x_request_id') | default(omit) }}"
      cookies: "{{ _final_cookies }}"
      cookies_string: >-
        {% set _cs = [] %}
        {% for k, v in _final_cookies.items() %}
        {% set _ = _cs.append(k ~ '=' ~ v) %}
        {% endfor %}
        {{ _cs | join('; ') }}
  vars:
    _uri_exclude: ["status", "url", "elapsed", "json", "content", "content_type", "msg", "redirected", "cookies", "cookies_string", "changed", "invocation", "failed", "failed_when_result"]
    _uri_headers: "{{ (uri_result | dict2items | rejectattr('key', 'in', _uri_exclude)) | items2dict | default({}) }}"
    _final_cookies: "{{ uri_result.get('cookies', {}) if (uri_result.get('cookies', {}) is mapping and uri_result.get('cookies', {}) | length > 0) else (_parsed_cookies_json | from_json) }}"

- name: Log curl request and response
  debug:
    msg: "Uri {{ task_name }}: status={{ task_output.status_code }}, request_body={{ task_config.body | default({}) | to_json }}, response_body={{ task_output.body | to_json }}"
